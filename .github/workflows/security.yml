name: Security checks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: telegram_voice/requirements.txt
      - name: Install test dependencies
        run: pip install fastapi==0.139.0 uvicorn==0.51.0 httpx==0.28.1 pydantic==2.13.4 python-dotenv==1.2.2 certifi==2026.6.17 python-telegram-bot==22.8
      - name: Compile Python
        run: python -m compileall -q telegram_voice
      - name: Security regression tests
        run: python -m unittest discover -s tests -v
